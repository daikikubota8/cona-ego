即座の決断が必要な場面で、熟考しすぎて動きが鈍くなることがあります。また、周囲の意見を気にしすぎて、自分の強いこだわりや本心を押し殺してしまうこともあり、納得感の低い決定に無理やり自分を合わせることでストレスを溜めるリスクがあります。論理的に正しい方向を目指すあまり、感情的な納得感が足りないメンバーを置き去りにしてしまい、一部で不満を生む可能性があります。", "motivUp": "自分の論理的な提案や、効率化の工夫が店舗の数字としてプラスの結果に現れた時に、高いやりがいを感じます。上司から、単なる業務遂行だけでなく「なぜそう判断したのか」という思考プロセスを高く評価されることで、さらに意欲的に知的な貢献をしようとします。明確なゴールが設定され、そこに向かってプロセスを構築していくことに喜びを感じるため、裁量を与えて任される環境において、最大の能力を発揮します。", "motivDown": "精神論や気合いだけで物事が決まり、論理的な根拠が軽視される環境では、極端にやる気を失います。また、上司から一方的で矛盾のある指示を受けたり、自分の論理的な説明が頭ごなしに否定されるような経験は、強い不信感に繋がります。ルーチンワークばかりで考える余地が全くない環境や、チームメンバー間での意思疎通が不十分で、非効率なやり方が繰り返される状況にも、強いストレスや無気力感を抱きやすいです。", "mgmtPoint": "斎藤さんに対しては、論理的な根拠を持って指示を行い、目的と達成基準を明確に示すことが非常に重要です。面談では、「あなたはどう考える？」と意見を問いかけ、本人の思考を引き出しながら目標をすり合わせることで、主体性と責任感を高めることができます。何か問題が起きた際も、事実確認を冷静に行い、建設的な議論を重ねることで、本人の中で納得感を持って次のアクションへと繋げていくことができます。"}, "冬子||C京急蒲田": {"strength": "穏やかで周囲に安心感を与えられる、チームの潤滑油となるような存在です。誰に対しても温かく接し、周囲のメンバー一人ひとりの気持ちを大切にする献身的な姿勢は、チームの空気を非常に和やかに保ちます。物事を冷静に捉え、極端に偏った判断をしないため、メンバー間での衝突を避けて平和的に物事を進める能力に長けています。チームの規律も守りつつ、周囲と協力して業務を着実に遂行できるため、非常に安定したパフォーマンスを発揮します。", "weakness": "自分自身の強い主張や意見を出すことを控えがちで、周囲のペースや意向に流されてしまう傾向があります。対人関係の摩擦を極端に避けるため、指摘すべき事項をあいまいにしたり、無理な頼み事でも断れずに抱え込んでしまったりと、自己犠牲的な行動をとってしまうことがあります。また、突発的な変化や、想定外の事態が起きた際、自分の中で悩みすぎてしまい、適切な決断が遅れたり、動きが止まってしまったりすることがあるため注意が必要です。", "motivUp": "チームのメンバーと穏やかに協力し合い、自分の働きが「助かった」と誰かに喜ばれる時に、高いモチベーションを感じます。上司や仲間から、個人の人間性や誠実さを評価される言葉をかけられることが、何よりの活力となります。役割が明確で、周囲と良好な関係の中で業務が進められる環境であれば、非常に安定して力を発揮します。自分の頑張りを丁寧に見てもらい、安心感を得られる環境であれば、意欲的に業務に取り組めます。", "motivDown": "チーム内の人間関係がギスギスしたり、誰かを責めるような攻撃的な雰囲気が漂う環境では、極度に萎縮してしまい、精神的に疲弊します。また、上司から感情を無視した厳しい指導を受けたり、成果のみを追求されるような圧力をかけられると、自分を否定されたと感じて殻に閉じこもります。自分の貢献が誰からも感謝されず、冷淡な扱いを受けるような状況が続くと、モチベーションを失い、消極的な態度をとるようになります。", "mgmtPoint": "まずは本人の穏やかさや、チームへの貢献を肯定し、心理的な安心感を担保することが何よりも重要です。指導の際は、頭ごなしに注意せず、一対一の環境で、本人の意思を尊重しながら具体的な行動改善を促してください。一人で悩みを抱え込まないよう、こまめに「最近どう？」と声をかけ、何かあれば相談できる安心感を与えてあげることが、より長く安定して力を発揮してもらうための最大のポイントです。"}, "ファレル||Cたまプラーザ": {"strength": "感情の起伏が少なく、論理的な思考に基づいて冷静に業務を遂行できる安定感があります。何事も客観的に捉えようとするため、現場の状況を冷静に判断し、効率的な手順や解決策を考えることに強みを発揮します。過度に自己主張をしたり、周囲に流されたりすることなく、淡々と与えられた業務をこなすことができるため、チームの中では非常に頼りになる実務家です。感情論に走ることなく、事実に基づいたコミュニケーションを好むため、混乱する現場においても冷静な立ち位置を保てます。", "weakness": "人への関心や感情的な配慮がやや薄く、周囲から「冷たい」「親しみにくい」という印象を持たれてしまうリスクがあります。チームの和よりも効率や論理を優先するため、人間関係の悩みや感情的なケアが必要な場面では、適切な対応が取れずに周囲との摩擦が生じる可能性があります。また、楽しさや熱意といった感情面を押し出すことが苦手なため、リーダーとしてチームを盛り上げたり、メンバーのモチベーションを高めたりすることに対して消極的になってしまいがちです。", "motivUp": "明確な目標や、論理的に正しいと納得できるプロセスを提示された時に高いモチベーションを示します。感情的な評価よりも、「これだけの成果を出した」「この業務が効率化した」といった具体的なデータや数値に基づいた評価を受けることで、自身の成長を実感できます。また、自分の専門性や判断力が認められ、裁量を持って合理的に業務を進められる環境であれば、非常に集中して高いパフォーマンスを発揮し、店舗の運営基盤を支える強力な戦力となります。", "motivDown": "論理的な根拠が不明確なまま精神論や気合いを強要される環境や、感情論が優先される人間関係のしがらみに巻き込まれると、大きなストレスを感じます。また、自分の合理的な判断が感情的に否定されたり、細かい感情的なケアを過度に求められたりすると、やる気を失い、周囲との関わりを避けようとするようになります。自分の業務内容に無関係なことに時間を奪われたり、効率を重視しないやり方を押し付けられたりすると、無気力になりやすいです。", "mgmtPoint": "感情的なアプローチよりも、論理的かつ端的な説明を心がけてください。フィードバックを行う際は、感情的な言葉ではなく、事実と具体的な数値、そして期待する行動を明確に伝えることで、スムーズに納得して改善に取り組んでくれます。また、直接的な感謝の言葉を好まない場合もあるため、本人の専門性やスキル、成果を認める形で敬意を示すのが有効です。チームの人間関係の調整役ではなく、実務のスペシャリストとしての役割を期待し、任せるスタンスが最も輝きます。"}, "ラマ||C柏": {"strength": "すべての能力項目が平均的にバランスよく整っており、極端な偏りがないため、どのような業務に対しても安定したパフォーマンスを発揮できる汎用性の高さが最大の特徴です。規律を守る堅実さと周囲への気配りを両立させており、論理的に状況を判断する能力も備えているため、店舗運営の基本を堅実にこなすことができます。何かに特化した強みがあるわけではありませんが、チームの状況に合わせて柔軟に動きを変えられるため、非常に扱いやすく安心感のあるメンバーです。", "weakness": "バランスが良すぎるがゆえに、これといった突出した強みや個性を自覚しにくく、本人も「自分には何ができるのか」と迷いを感じやすい傾向があります。適応力が高い分、周囲に合わせて自分の意見を抑え込んでしまうことも多く、主体的な提案やリーダーシップを発揮することに控えめな一面も持ち合わせています。大きなトラブルがない限り淡々とこなしますが、新しい環境への挑戦や、自ら困難に飛び込んでいくような行動には慎重になってしまいます。", "motivUp": "チームの一員として自分がしっかりと役割を果たせていると実感できたときや、周囲から安定感があることを認められたときに高い満足感を得ます。上司から、日々の地道な業務遂行を具体的に称賛されたり、「いつも変わらず対応してくれて助かる」というような安定性を肯定するフィードバックをもらうことで、安心感と共にモチベーションを高く維持できます。役割が明確で、周囲と良好な協力体制にある環境が、もっとも力を発揮しやすい環境です。", "motivDown": "チーム内で過度な競争があったり、激しい対立が起きているような不安定な環境は、ストレスを感じやすく、本来の安定したパフォーマンスが発揮できなくなります。自分の働きが誰からも気づかれず、ただ淡々と作業をこなすだけの環境では、強い無力感を感じてやる気を失います。また、目標が極端に高い挑戦ばかりを求められ、自分の力量を超えた負荷が継続的にかかると、バランスを崩して自信を失ってしまう原因になります。", "mgmtPoint": "まずは日々の安定した働きを具体的に褒め、その存在がチームの安定に欠かせないことを伝えて安心感を与えてください。面談では「今の仕事で、もっとこうしたいことはあるか？」と問いかけ、本人の中から少しずつ目標を引き出すような対話を行うことで、徐々に主体性を引き出すことができます。何か新しいことに挑戦させる場合は、いきなり高い負荷をかけるのではなく、小さな成功体験を積み重ねさせる並走が重要です。"}, "リフキ||C船橋": {"strength": "周囲への配慮、自律的な姿勢、そして組織への適応能力が非常にバランスよく整っている、安定した実力を持つメンバーです。感情と論理のバランスが良いため、チームの人間関係を大切にしつつ、やるべき業務を正確に遂行することができます。周囲の空気を読んで柔軟に対応する能力も高く、リーダーの意図を汲み取って行動できるため、どんな役割を任せても一定以上の成果を期待できる、非常に安心感のある存在です。", "weakness": "すべてにおいて平均以上のバランスを持つがゆえに、特定の業務で圧倒的な突出感を見せることが少なく、自分の個性をどう活かすかで迷うことがあるかもしれません。また、周囲への適応力が高い分、自分の本音よりもチームの空気を優先してしまい、本当は別のやり方をしたいと思っていても、我慢してしまう傾向があります。器用にこなせてしまうがゆえに、周りから頼られすぎてしまい、自分の業務負担が増えやすい点には注意が必要です。", "motivUp": "自分の仕事がチームの目標達成や人間関係の安定に貢献していると実感できた時に、高いやりがいを感じます。上司から、その場に応じた適切なサポートやバランス感覚を具体的に認められることが、何よりの活力となります。役割が明確で、周囲と良好な協力体制にある環境であれば、非常に意欲的に取り組めます。自分の工夫がチーム全体にプラスの影響を与えていると感じるとき、強い達成感を得られます。", "motivDown": "チーム内で深刻な人間関係のトラブルがあったり、誰かを責めるような殺伐とした空気を感じると、持ち前の順応性が災いして精神的に疲弊します。自分の努力や貢献が誰からも評価されず、ただ単調な業務だけを淡々と押し付けられるような環境は、強い無力感を感じさせます。方針が一貫せず、何が正解か分からないような混乱した状況も、バランス重視のリフキさんにとってはストレスの原因となります。", "mgmtPoint": "日々の安定した働きを具体的に称賛し、そのバランス感覚がチームにとって重要であることを伝えてください。面談では、「今後どんなことに挑戦してみたい？」と問いかけ、本人の意欲を少しずつ引き出す対話を行うことで、より主体的な成長を促すことができます。また、業務が過多になっていないかを定期的に確認し、本人が一人で抱え込んでいないかを見守ることで、安定した高いパフォーマンスを継続できます。"}, "フー||C船橋": {"strength": "論理的な分析能力が非常に高く、物事を客観的に見て解決策を導き出すことができる実力派メンバーです。周囲への配慮（NP）もあるため、冷徹なだけの分析ではなく、チームの人間関係にも配慮しながら改善案を提案できるという強みがあります。自分の意見をある程度しっかり持っており、周囲に依存せずに自律的に行動できるため、トラブル対応や難しい業務においても、落ち着いて着実な対応ができる頼もしさがあります。", "weakness": "自律心が高い一方で、周囲の空気に合わせる（AC）順応性が他の能力に比べて控えめなため、納得できないことに対しては、組織のルールであっても率直に疑問を呈するような頑固さが現れるかもしれません。また、感情よりも論理を優先するため、周囲からは「正論ばかりで融通が利かない」と捉えられてしまうリスクがあります。楽しさを追求する余裕がやや欠ける傾向があり、ストイックになりすぎて自分を追い込んでしまうこともあります。", "motivUp": "店舗の課題に対して、自分の論理的な戦略や分析が投入され、それが目に見える成果や効率化として成功を収めた時に最大の喜びを感じます。上司から、その高い分析力やプロフェッショナルな姿勢を対等なビジネスパーソンとして認められ、信頼して裁量を任される環境において、驚異的なパフォーマンスを発揮します。自分の提案が店舗の改善につながる実感が持てるとき、高い意欲と達成感を得ることができます。", "motivDown": "「とりあえず気合いで」「昔からこうだから」といった、合理的根拠のない精神論や古い因習を押し付けられる環境には、非常に強い拒絶反応を示します。また、自分の意見や論理的な提案が、上司の機嫌や感情論によって頭ごなしに却下されるような状況では、信頼を完全に失ってしまいます。チーム内で感情的な対立が繰り返される環境も、論理を重んじるフーさんにとっては非常に居心地が悪く、意欲を削ぐ原因となります。", "mgmtPoint": "指示を出す際は、その「目的」と「論理的根拠」を明確かつ端的に伝えてください。感情的なアプローチは避け、一人の専門家として意見を求めるスタンス（「この数値、どう分析する？」）をとることで、最大限の能力を引き出せます。本人が少しストイックになりすぎているときは、休憩を促したり、ポジティブな面を称賛したりするような、柔軟なサポートを行うことで、より長期的に活躍してくれるようになります。"}, "チャンチャン||C蒲田": {"strength": "誰に対しても深い思いやりを持ち、チームの人間関係を円滑に保つことができる、店舗の癒やしとなる存在です。面倒見が非常に良く、困っているメンバーがいれば放っておけないため、チーム全体の安心感や結束力を高める要となります。論理的な思考と、周囲と調和する順応性も高いレベルで併せ持っており、現場の状況を冷静に把握しつつ、温かい心でメンバーを指導したりフォローしたりすることができる、非常に安定感のあるメンバーです。", "weakness": "優しさゆえに、厳しい指摘や注意をしなければならない場面で、相手を傷つけることを恐れて曖昧な態度をとってしまう傾向があります。また、責任感が強すぎて、自分のキャパシティを超えて他人の悩みを抱え込み、結果として自身が疲弊してしまうリスクを抱えています。対人関係のバランスを優先しすぎるあまり、本来であれば断るべき無理な頼み事も引き受けてしまい、自分の業務が後回しになることもあるため注意が必要です。", "motivUp": "チームのメンバーから信頼され、「チャンチャンさんがいてくれて助かる」といった言葉をかけられることが、何よりのやりがいになります。上司から「あなたの優しさがチームを支えている」と、自身の人間性を直接的に承認してもらうことが、さらなる意欲に繋がります。メンバーと協力して、和気あいあいとした雰囲気の中で成果を出せる環境であれば、どんな業務であっても高い意欲を持って取り組むことができます。", "motivDown": "チーム内で争いがあったり、誰かを責めるような攻撃的な雰囲気が漂う環境では、極端に萎縮してしまい、本来の力を発揮できません。また、上司から感情を無視したドライな指導を受けたり、成果のみを追求されるような圧力をかけられると、深い失望感を覚え、やる気を失います。周囲の人間関係のしがらみに巻き込まれすぎたり、感謝の言葉がないまま次々と業務を押し付けられると、急激に精神的に疲弊してしまいます。", "mgmtPoint": "まずは本人の優しさや貢献を肯定し、信頼関係を築くことから始めてください。指導の際も、まずは本人の貢献を言葉にした上で、改善点を優しく提案するフィードバックが有効です。責任感が強いため、適宜業務量を調整してあげることが、長く安定して活躍してもらうための秘訣です。また、定期的な面談で心身の調子を確認し、一人で悩みを抱え込ませないようなフォロー体制を整えることで、安心して実力を発揮してくれます。"}, "桃||C川崎": {"strength": "自由な発想力と前向きなエネルギーが非常に高く、店舗に新しい風を吹き込むムードメーカーです。楽しいことや新しいことに対する感度が鋭く、周囲を巻き込んで盛り上げる力があるため、店舗に活気をもたらします。論理的な思考力や組織への順応性も適度に持ち合わせているため、突飛な行動だけでなく、店舗の運営ルールを守りながら自分なりに工夫して仕事を楽しむ柔軟さがあります。前向きでエネルギッシュな姿勢は、チームの士気を上げる貴重な存在です。", "weakness": "楽しさを優先するあまり、細部へのこだわりや地道な作業で集中力が途切れてしまうリスクがあります。また、周囲の空気を大切にする一方で、自分の感情の起伏が激しくなってしまう傾向もあるため、気分が乗らないときはパフォーマンスが落ちてしまうこともあります。決まった手順を繰り返す作業においては、退屈さを感じてモチベーションを維持することが難しくなる場合があるため、飽きさせない工夫が必要です。", "motivUp": "自分のアイデアが採用されたり、チームで楽しく成果を出せた時に高いモチベーションを発揮します。上司から、その前向きな姿勢や創造的なアプローチを「店舗に活気を与えてくれている」と具体的に認められることが、何よりの喜びです。新しい企画や業務の提案を歓迎する環境であれば、非常に高い集中力を発揮します。自分の行動によって周囲の空気が明るくなるのを実感できるとき、最大のやりがいを感じます。", "motivDown": "単調な業務の繰り返しや、厳しい制限がある環境では意欲が低下します。感情を無視したドライな指導や、楽しさを否定されるような堅苦しい職場環境では、持ち前のエネルギーが抑圧され、やる気が急激に萎んでしまいます。また、自分のアイデアが誰からも見向きされないと感じたり、ただ言われたことだけを機械的に繰り返すような役割を与えられた場合には、急速に飽きてしまい、業務への情熱を失ってしまう恐れがあります。", "mgmtPoint": "創造的な側面を活かせる役割を与えつつ、適度に論理的な目標を確認するフォローが必要です。何かを依頼する際は、「これをお願いしたい」というだけでなく、「この仕事でこんな面白さを作ってほしい」というように、本人の好奇心を刺激するような伝え方を心がけてください。地道な作業が必要な場合は、その先にどんな楽しいゴールがあるかを共有し、飽きさせないような工夫を凝らしてあげてください。"}, "カイン||C大宮": {"strength": "組織のルールや方針を正確に理解し、それに従って着実に業務をこなすことができる、非常に誠実で順応性の高いメンバーです。感情に流されることなく、冷静に状況を見て自分の役割を果たすことができるため、どんな店舗環境でも安定したパフォーマンスを発揮します。周囲に波風を立てず、ルールの中でしっかりと成果を出そうとする姿勢は、店長にとって最も安心して仕事を任せられる存在の一つです", "weakness": "順応性が高いため、自分の意見よりも組織や周囲の意向を優先しすぎる傾向があります。新しいアイデアを出したり、自ら主体的に動くことよりも、決まった手順を守ることを重視するため、店舗の活性化や変革という場面では動きが鈍くなるかもしれません。非常に器用に立ち回れる一方で、周囲から頼られすぎてしまい、自分の許容範囲を超えて業務を抱えてしまうリスクには注意が必要です。", "motivUp": "自分の仕事が組織の目標達成に貢献していると実感でき、その成果を明確に評価された時に強いやりがいを感じます。上司から、ルールを徹底する誠実な仕事ぶりを信頼されていると感じられたとき、非常に高い意欲を発揮します。役割が明確で、周囲と良好な協力体制にある環境であれば、非常に意欲的に取り組めます。自分の努力が認められ、組織の中で必要とされている実感が、最大のモチベーションです。", "motivDown": "評価基準が曖昧で、何が正解か分からないような混乱した環境は、非常に強いストレスを感じます。自分の誠実な業務が誰からも評価されず、ただ業務量だけが増え続けるような状況では、強い孤独感を感じてしまいます。また、急激な方針転換で何が求められているか分からなくなるような、混乱した状況下では意欲が著しく削がれてしまいます。感情的な理不尽さを経験した際も、非常に深いショックを受けます。", "mgmtPoint": "日々の着実な業務遂行を具体的に称賛し、その安定感がチームにとって重要であることを伝えてください。面談では、「今の業務で何か改善したいことはある？」と問いかけ、本人の小さな気づきを肯定的に受け止めることで、主体的な働きかけを少しずつ引き出すことができます。本人が無理をして抱え込んでいないか定期的に業務を確認し、安心感を与えながら、少しずつ新しい挑戦を促すことが成長を支える上で大切です。"}, "リン||C麻布十番": {"strength": "論理的な分析能力が非常に高く、事実に基づいて物事を冷静に判断する力が抜群です。規律や責任を重んじる姿勢もあり、やるべき業務を正確に遂行するプロフェッショナルな一面を持っています。周囲への配慮も適度にあるため、冷淡な印象にならず、高い知性と誠実さを兼ね備えた実力派です。適応力が低いため、空気に流されず、自分の信念や理に基づき、自律的に動くことができる芯の強さがある頼もしい存在です。", "weakness": "周囲への適応力が低いため、合理的でないルールや納得のいかない方針に対しては、一切妥協せず、時に正面から反発したり、組織の論理と衝突してしまうリスクがあります。楽しさを追求するエネルギーや、周囲に柔軟に合わせる力は控えめであるため、変化の激しい環境や、感情的な繋がりを強く求めるチームでは、少し浮いてしまう可能性があります。マニュアル人間ではなく、自分の論理を優先するため、調整力が必要な場面では摩擦が生じやすいです。", "motivUp": "自分の論理的な分析や提案が認められ、それが店舗運営の効率化や確実な成果に結びついた時に最大のやりがいを感じます。上司から一人の専門家として敬意を払われ、ある程度の裁量を持って自分のやり方で業務を進められる環境において、非常に高いパフォーマンスを発揮します。方針が一貫しており、論理的に納得できる説明がなされている状況であれば、何よりも高い集中力と責任感を持って業務を完遂させます。", "motivDown": "合理的根拠のない「精神論」や、その時の気分で変わる一貫性のない指示は、強い拒絶反応の原因となります。自分の論理的な意見が感情で頭ごなしに却下されたり、理不尽な対応をされると、組織に対する信頼を急速に失います。自分の専門性を無視され、ただ従うことだけを強要されるような環境では、強い無力感と強い苛立ちを覚え、組織に対して否定的になってしまう傾向があります。", "mgmtPoint": "常に論理的な根拠を明確に伝えて指示を出し、一人の専門家として敬意を払ったコミュニケーションを徹底してください。感情的な説得は避け、事実に基づいた対話で「なぜその業務が必要か」という背景を理解してもらうプロセスを大切にしてください。本人の強みである分析力や論理的思考を活かせる業務を任せ、その成果を論理的に評価することで、強い信頼関係を築くことができます。"}, "ソー||C上野": {"strength": "論理的な思考力（A）を持ち、組織の方針（AC）に順応しながら着実に業務をこなせるメンバーです。極端な偏りがないため、どのような環境でも安定して力を発揮できます。決められた手順を淡々と守り、チームの中で自分の立ち位置を正しく把握して行動できる堅実さがあります。余計な摩擦を生むことなく、店舗の基本的な業務を正確に着実に遂行できるため、チームの安定的な運営を支える存在として重宝される存在です。", "weakness": "自ら積極的に主導権を握ることは控えめで、周囲の意向に合わせて動く傾向が強いため、主体的な成長を引き出す必要があります。また、論理的である一方で、突発的な変化や想定外の事態が起きた際、自分の中で悩みすぎてしまい、適切な決断が遅れたり、動きが止まってしまったりすることがあるため注意が必要です。自己主張が控えめなため、本人の意図ややりたいことが上司に伝わりにくく、機会損失を生むリスクがあります。", "motivUp": "役割が明確に指示され、自分の仕事が店舗の運営に貢献していると確信できる時に安定した意欲を保ちます。上司から具体的な役割を与えられ、「あなたに任せたい」と信頼されていると感じられる環境で実力を発揮します。また、業務の進め方について、一貫性のある明確なフィードバックを受けることで、安心して業務を継続できます。地道な貢献をしっかり見てくれる上司の下であれば、非常に長く安定して活躍します。", "motivDown": "評価基準が不明確だったり、自分の立ち位置が分からなくなるような環境では自信を失いやすいです。上司からの指示が頻繁に変わり、何が正解かわからない状況では、混乱して動きが鈍ってしまいます。自分の努力を認めてもらえないまま、次々と業務を押し付けられる環境や、チームメンバー間での意思疎通が不十分で、非効率なやり方が繰り返される状況にも、強いストレスや無気力感を抱きやすい傾向があります。", "mgmtPoint": "定期的なフィードバックで役割を再確認し、少しずつ難しい業務に挑戦させることで主体性を高める指導が有効です。面談では、本人から意見を引き出すために、「どうすればいいと思う？」と問いかけ、安心できる環境を作ってあげてください。地道な仕事を丁寧にこなしていることを具体的に褒めることで、自信を育むことができます。本人が自分から発信しにくいタイプであることを考慮し、こまめな声かけを心がけてください。"}, "ヘイマン||C津田沼": {"strength": "周囲への配慮（NP）と高い順応性（AC）を持ち、組織の枠組みの中で円滑に立ち回ることができるメンバーです。チーム全体の人間関係を大切にし、穏やかな空気を作る能力に長けています。感情と論理のバランスも取れており、やるべき業務を正確に遂行することができます。周囲の空気を読み、リーダーの意図を汲み取って行動できるため、非常に安心感のある存在です。", "weakness": "楽しさを追求するエネルギー（FC）が低いため、単調なルーチンワークが続くと、集中力が散漫になる可能性があります。また、順応性が非常に高いため、自分の意見よりも周囲や組織の意向を優先しすぎる傾向があります。自ら積極的に環境を変えようとするエネルギーは控えめで、主体的な改革よりも、今の調和を守ることを好むかもしれません。", "motivUp": "チームの仲間と協力しながら、穏やかな環境で安定した成果を出している時に、高い充実感を得ます。自分の細やかな気配りが周囲に感謝され、「あなたがいてくれて安心する」と言われることが何よりの活力となります。上司から、日々の丁寧な仕事ぶりやチームへの安定的な貢献を具体的に認められる環境であれば、非常に長く安定して活躍してくれます。", "motivDown": "チーム内の人間関係がギスギスしていたり、誰かを責めるような攻撃的な雰囲気に置かれると、ひどく落ち込み、精神的に非常に不安定になります。また、成果のみを追求するドライな評価をされたり、感情を無視した厳しいプレッシャーをかけられると、深い失望感を覚え、意欲を失います。自分の貢献が誰にも気づかれず、ただ淡々と業務だけを押し付けられる状況が続くと、強い無力感を抱いてしまいます。", "mgmtPoint": "まずは心理的な安心感を与え、日々の献身的な貢献を積極的に肯定することが何よりも重要です。面談では、「最近困っていることはない？」と優しく促すことで、安心して本音を引き出せます。本人が無理をして抱え込んでいないか定期的に確認し、サポートする姿勢を見せることで、信頼関係がより強固になります。その穏やかな姿勢をチーム全体に広げてくれるような役割を与えると、チームの士気が安定します。"}, "小島正太郎||C船橋": {"strength": "周囲への温かな配慮と冷静な判断力を備え、環境に適応しながら着実に業務を遂行する力があるメンバーです。チーム全体の状況を俯瞰し、困っている仲間をフォローする優しさと、論理的な思考で物事を整理する冷静さを併せ持っているため、店舗運営において非常にバランスの良い貢献ができます。派手な自己主張はしませんが、影でしっかりとチームを支え、ルールを守りながら安定した成果を出し続けられる堅実な存在です。", "weakness": "自分自身で積極的に環境を変えようとするエネルギー（FC）が控えめなため、現状維持に満足してしまう傾向があります。周囲に合わせようとする意識が強いため、本当はもっとこうしたいという意見があっても、周りの雰囲気を優先してしまい、自分の可能性を抑え込んでしまうことが多々あります。また、突発的な変化や、責任の重い決断を迫られる場面では、慎重になりすぎて動きが止まってしまうこともあるかもしれません。", "motivUp": "チームの和が保たれ、その中で自分の地道なサポートがメンバーに感謝された時に高いやりがいを感じます。上司から、その冷静な判断や温かいサポートを「いつも助かっている」と具体的に認められることが、何よりの活力となります。役割が明確であり、周囲と協力して業務が進められる環境であれば、非常に安定した意欲を持って取り組めます。自分の努力が店舗の安定につながっているという実感が、大きな自信と意欲を生みます。", "motivDown": "チーム内に激しい争いがあったり、攻撃的な雰囲気が漂う環境では、ひどく落ち込み、精神的に非常に不安定になります。自分の貢献が誰からも評価されず、ただ業務を淡々とこなすだけを強要される状況や、評価基準が不明確なまま放置される環境は、強い無力感を感じさせます。また、急激な方針転換で何が求められているか分からなくなるような、混乱した状況下では意欲が著しく削がれてしまいます。", "mgmtPoint": "日々の安定した働きを具体的に称賛し、その存在がチームに不可欠であることを繰り返し伝えてください。面談では、「今の業務で何か改善したいことはある？」と問いかけ、本人の小さな気づきを肯定的に受け止めることで、主体的な働きかけを引き出すことができます。また、本人に過度な負担が集中していないか定期的に確認し、安心感を与えながら、少しずつ新しい挑戦を促すことが、成長を支える上で大切です。"}, "テディ||C横浜鶴屋町": {"strength": "規律を守りつつ、周囲と調和しながらも自分の意見をしっかりと行動に移せるバランス感覚を持っています。正義感が強く、やるべきことをやり遂げるという責任感がある一方で、仲間と楽しく働くことや周囲への順応性も高いという、非常に使い勝手の良い能力の持ち主です。現場では状況を見て「今何をすべきか」を判断し、チームの和を乱さずにタスクをこなすことができます。厳しい要求にも、持ち前の適応力で柔軟に応えようとする意欲があります。", "weakness": "周囲の評価を過度に気にする傾向があり、自分の本音を抑え込んで周囲に迎合してしまうことがあります。責任感があるからこそ、自分の抱える役割と周囲からの期待との間で葛藤しやすく、結果としてストレスを抱え込んでしまう懸念があります。論理的な整合性よりも、人間関係のバランスやその場の雰囲気を優先してしまい、時に決断が曖昧になったり、本心と異なる行動をとってしまうことがあります。周囲の顔色を伺うあまり、自分の本来の力を出しきれないことがあります。", "motivUp": "自分がチームにとって必要とされているという実感や、上司からの期待に応えられた時に高いモチベーションを感じます。「テディさんがやってくれて助かった」という具体的な感謝の言葉は、本人の努力を肯定するものとして非常に効果的です。また、自分の目標とチームの目標が一致しており、周囲と協力しながら成果を上げられる環境であれば、非常に意欲的に取り組みます。自分の居場所があり、適度に役割を与えられていると感じることで安定します。", "motivDown": "周囲と関係が悪化したり、チーム内で孤立したりする状況は、最も強いストレスとなります。また、上司からの指導が一貫しておらず、何を信じればいいのか分からない状態に置かれると、不安感でいっぱいになります。自分の貢献が認められず、存在を軽視されるような扱いを受けると、急激にモチベーションを失い、消極的な態度になってしまいます。責任ばかりを押し付けられ、フォローがない環境も、やる気を削ぐ大きな原因となります。", "mgmtPoint": "一対一の面談の時間を大切にし、本人の不安や意見をしっかりと受け止める姿勢を見せることが関係構築の鍵です。指導の際は、頭ごなしに注意せず、本人の責任感や貢献をまずは認めてください。何か問題があった時は、「次はどうしようか？」と一緒に考えるスタイルを取ることで、本人も安心して改善に取り組めます。過剰に周りに気を使いすぎていないか、定期的に声をかけ、一人で悩まないようサポートしてあげることが、長く活躍してもらうためのポイントです。"}, "アイン||C横浜鶴屋町": {"strength": "非常に高い献身性と、周囲への温かい配慮ができるリーダー格の素質を持っています。困っている人がいればすぐに気付き、自発的に手助けをする姿勢は、チームのメンバーから絶大な信頼を寄せられます。論理的な思考力も併せ持っており、現場の状況を客観的に見ながら、優しさを持ってメンバーを指導したりフォローしたりすることができるバランスの良い存在です。周囲に流されすぎず、自分の信念をしっかりと持って行動できるため、チームの安定的な運営に大きく貢献します。", "weakness": "相手に対して過度に気を使い、優しさが裏目に出て、本来言うべき厳しい指摘や指導が後回しになってしまうことがあります。また、周囲の期待に応えようとする意識が強すぎるあまり、自分のキャパシティを超えて業務を引き受けてしまい、結果として疲弊してしまうリスクがあります。論理的に正しいと分かっていても、感情的なしがらみや対人関係のバランスを優先しすぎるあまり、判断を遅らせてしまうことがあるため、ここぞという時の決断力が課題です。", "motivUp": "チームのメンバーから頼りにされ、「アインさんがいてくれて本当に良かった」と直接感謝されることが、何よりの原動力となります。自分の献身的な働きが、具体的な成果や店舗の円滑な運営に繋がっているという手応えを感じられる環境で、高い意欲を発揮します。また、上司から公平に能力を評価され、さらなる責任ある役割を任されるような期待感を感じることで、自らの能力を最大限に発揮し、リーダーとしてさらに成長しようとします。", "motivDown": "チーム内で不和が起きたり、誰かが理不尽な扱いを受けている状況を見ると、精神的に大きなストレスを感じます。また、上司から感情的な言葉で叱責されたり、自分の貢献を軽視されたりすると、深い失望感を覚え、やる気を失います。論理的ではない方針転換や、信頼を裏切るような態度を上司から取られると、関係を修復する意欲を失い、消極的になります。自分が大切にしている人たちが尊重されない環境では、長く意欲を維持することは難しいでしょう。", "mgmtPoint": "アインさんの高い献身性を認め、信頼して任せているというメッセージを定期的に伝えてください。相談を受けた際は、感情的な面をまずはしっかりと受け止め、その上で論理的な整理の手助けをしてあげると、本人の中で納得感が生まれ、次の一歩を踏み出しやすくなります。指導を行う際は、まずは本人の貢献を言葉にした上で、改善点を提案する「サンドイッチ型」のフィードバックが有効です。責任感が強いため、適度に業務の負担を調整してあげることが、長く活躍してもらう秘訣です。"}, "中村直人||C田町芝浦": {"strength": "周囲への温かな配慮と、チームの調和を大切にする誠実なメンバーです。チーム全体の人間関係に敏感で、穏やかな雰囲気を作る能力に長けています。自分一人で突出するのではなく、周囲と協調しながら役割を全うしようとする姿勢があるため、店舗運営においてチームの潤滑油として非常に頼りになる存在です。", "weakness": "リーダーシップや主導権を握るような動きは控えめであり、主体的に環境を変えようとするエネルギーはあまり強くありません。また、論理的な分析や突発的な問題への対処はやや苦手な傾向があるため、難しい課題や複雑な業務では慎重になりすぎて動きが止まってしまうことがあります。", "motivUp": "仲間と協力しながら、穏やかな環境で安定した成果を出している時に、高い充実感を得ます。自分の細やかな気配りが周囲に感謝され、「あなたがいてくれて安心する」と言われることが何よりの活力となります。上司から、その日々の丁寧な仕事ぶりやチームへの貢献を具体的に認められる環境であれば、非常に長く安定して活躍してくれます。", "motivDown": "チーム内の人間関係がギスギスしていたり、攻撃的な雰囲気に置かれると、ひどく落ち込み、精神的に非常に不安定になります。また、成果のみを追求するドライな評価をされたり、感情を無視した厳しいプレッシャーをかけられると、深い失望感を覚え、意欲を失います。自分の貢献が誰にも気づかれない環境では、強い無力感を抱いてしまいます。", "mgmtPoint": "日々の穏やかで誠実な働きを具体的に称賛し、その存在がチームに不可欠であることを繰り返し伝えてください。面談では、「最近困っていることはない？」と優しく促すことで、安心して本音を引き出せます。本人が無理をして抱え込んでいないか定期的にフォローし、安心感を与えながら、少しずつ新しい役割を任せることで、着実な成長を支えることができます。"}, "イコマ||C田町芝浦": {"strength": "周囲への温かな配慮（NP）と高いバランス感覚を兼ね備えた、非常に優秀なメンバーです。状況を冷静に判断する力（A）もあり、チームの人間関係を大切にしつつ、やるべき業務を正確にこなすことができます。どのような役割でも一定以上の成果を出せる柔軟性があり、チーム全体の雰囲気を良くしながら、目標達成にも貢献できる非常に頼もしい存在です。", "weakness": "すべてにおいてバランスが良いため、特定の領域で突き抜けた個性を発揮することに迷うことがあるかもしれません。また、配慮や順応性が高いがゆえに、チームの空気を壊さないように自分の本音を我慢してしまいがちです。責任感が強いため、自分一人で抱え込んで疲弊してしまうリスクがあることには注意が必要です。", "motivUp": "チームの一員として貢献し、その働きが周囲から感謝された時に高いやりがいを感じます。上司から、その高いバランス感覚や柔軟な対応を具体的に称賛されることが、最大の活力となります。役割が明確で、周囲と良好な協力体制にある環境であれば、非常に意欲的に取り組めます。自分の工夫がチーム全体にプラスの影響を与えていると実感できるときに、高い達成感を得ます。", "motivDown": "チーム内で深刻な人間関係のトラブルがあったり、殺伐とした空気を感じると、精神的に疲弊します。自分の努力や貢献が誰からも評価されず、単調な業務だけを押し付けられる環境は、強い無力感を感じさせます。方針が一貫せず、何が正解か分からないような混乱した状況も、バランス重視のイコマさんにとっては強いストレスの原因となります。", "mgmtPoint": "日々の安定した働きを具体的に称賛し、そのバランス感覚がチームにとって重要であることを伝えてください。面談では「今後、どんなことに挑戦してみたい？」と問いかけ、本人の意欲を少しずつ引き出す対話を行うことで、より主体的な成長を促すことができます。また、業務が過多になっていないか定期的に確認し、本人が一人で抱え込んでいないかを見守ってください。"}};
// 個々のスタッフ・店長の強み・弱みを、CP/NP/A/FC/ACのスコアパターンから自動生成する
const AXIS_TRAITS = {
  cp: {
    high: { title:(v)=>`高い規律意識・責任感（CP: ${v}）`,
      text:'決めたルールや基準を大切にし、必要な場面では毅然とした態度をとれます。責任感が強く、周囲から「頼れる」「筋を通す人」と見られやすいタイプです。' },
    low: { title:(v)=>`規律への厳しさは控えめ（CP: ${v}）`,
      text:'ルールを強く押し付けるタイプではなく、柔軟で温和な印象を与えます。一方で、必要な場面であえて厳しく指摘することが心理的なハードルになりやすい面があります。' }
  },
  np: {
    high: { title:(v)=>`高い思いやり・ホスピタリティ（NP: ${v}）`,
      text:'周囲への気配りやケアが自然にできるタイプです。困っている人に気づいて支える力があり、チームの雰囲気を和らげる存在になれます。' },
    low: { title:(v)=>`感情面のケアは控えめ（NP: ${v}）`,
      text:'相手の感情に深く寄り添うよりも、事実や結果を重視する傾向があります。効率重視な分、繊細なメンタルケアが必要な場面では意識的なフォローが必要です。' }
  },
  a: {
    high: { title:(v)=>`高い論理的思考力（A: ${v}）`,
      text:'物事を客観的に分析し、根拠に基づいて考えることが得意です。感情に流されず、冷静な判断や理由付けができる強みがあります。' },
    low: { title:(v)=>`感覚・直感型（A: ${v}）`,
      text:'データや理屈よりも、感覚や勢いで動くタイプです。フットワークは軽い一方、行動の理由を筋道立てて説明するのはやや苦手な傾向があります。' }
  },
  fc: {
    high: { title:(v)=>`高いエネルギー・自由な自己表現（FC: ${v}）`,
      text:'明るく自由な自己表現ができ、現場を盛り上げる力があります。ムードメーカーとして周囲を巻き込み、楽しい雰囲気を作れるのが強みです。' },
    low: { title:(v)=>`落ち着いた自己表現（FC: ${v}）`,
      text:'感情表現は控えめで、静かに物事を進めるタイプです。安定感がある一方、自ら勢いを作って周囲を巻き込むような場面では発信力がやや弱くなりがちです。' }
  },
  ac: {
    high: { title:(v)=>`高い協調性・順応力（AC: ${v}）`,
      text:'周囲の意見や方針に耳を傾け、和を大切にできるタイプです。ルールや指示に素直に従い、周囲との軋轢を生みにくい安心感があります。' },
    low: { title:(v)=>`自分の意見をしっかり持つタイプ（AC: ${v}）`,
      text:'周囲に合わせすぎず、自分の考えやペースを大切にするタイプです。主体性は強みですが、チームの方針と噛み合わない場合は摩擦が生まれやすい面もあります。' }
  }
};
function genProfileText(p){
  const scores = AXES.map(ax=>({k:ax.k, v:p[ax.k]}));
  const sorted = [...scores].sort((a,b)=>b.v-a.v);
  const max = sorted[0].v, min = sorted[sorted.length-1].v;
  if(max - min <= 4){
    // 極端な偏りがない「バランス型」
    return {
      strengths: [{ title:'バランスの取れた安定感', text:'CP・NP・A・FC・ACのすべてが同程度の水準にあり、極端な偏りがありません。感情の起伏が少なく、状況に応じて柔軟に振る舞える「バランサー」タイプです。' }],
      weaknesses: [{ title:'突出した強みの見えにくさ', text:'特定の得意分野が目立ちにくいため、周囲から「何が得意なのか分かりにくい」と思われることがあります。得意分野を自分から発信していくと、評価につながりやすくなります。' }]
    };
  }
  const top2 = sorted.slice(0,2);
  const bottom2 = sorted.slice(-2).reverse();
  return {
    strengths: top2.map(s=>({ title: AXIS_TRAITS[s.k].high.title(s.v), text: AXIS_TRAITS[s.k].high.text })),
    weaknesses: bottom2.map(s=>({ title: AXIS_TRAITS[s.k].low.title(s.v), text: AXIS_TRAITS[s.k].low.text }))
  };
}

function populateStaffStoreSelect(){
  const sel = document.getElementById('staffStoreSelect');
  sel.innerHTML = storeList.map(s=>`<option value="${s}">${s}</option>`).join('');
  sel.addEventListener('change', renderStaffPicker);
}

function getStorePeopleForStaffTab(store){
  const manager = managers.find(m=>m.storeNorm===store);
  const staff = staffByStore[store]||[];
  const people = [];
  if(manager) people.push(manager);
  people.push(...staff);
  return people;
}

let currentStaffPickerPeople = [];
function renderStaffPicker(){
  const store = document.getElementById('staffStoreSelect').value;
  const people = getStorePeopleForStaffTab(store);
  currentStaffPickerPeople = people;
  const picker = document.getElementById('staffPicker');
  if(!people.length){
    picker.innerHTML = '';
    document.getElementById('staffProfileContent').innerHTML = '<div class="empty-hint">この店舗のデータがありません</div>';
    return;
  }
  picker.innerHTML = people.map((p,i)=>{
    const cls = 'staff-pill' + (p.hasData? '' : ' nodata') + (i===0? ' active':'');
    const crown = p.role==='店長' ? '<span class="crown">👑</span>' : '';
    return `<button class="${cls}" data-idx="${i}">${p.name}${crown}</button>`;
  }).join('');
  picker.querySelectorAll('.staff-pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      picker.querySelectorAll('.staff-pill').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderStaffProfile(currentStaffPickerPeople[+btn.dataset.idx]);
    });
  });
  renderStaffProfile(people[0]);
}

function renderStaffProfile(p){
  const el = document.getElementById('staffProfileContent');
  if(!p){ el.innerHTML=''; return; }
  if(!p.hasData){
    el.innerHTML = `<div class="card">
      <div class="name-row"><span class="nm">${p.name}</span><span class="badge">${p.role}</span></div>
      <div class="empty-hint">この方はエゴグラムデータが未登録のため、個別分析を表示できません。</div>
    </div>`;
    return;
  }
  const curated = STAFF_CURATED[`${p.name}||${p.store}`];
  const header = `<div class="card">
      <div class="name-row"><span class="nm">${p.name}</span><span class="badge">${p.role}</span></div>
      ${radarHtml(p)}
    </div>`;

  if(curated){
    el.innerHTML = header + `
    <div class="card">
      <h2>💪 強み</h2>
      <p>${curated.strength}</p>
    </div>
    <div class="card">
      <h2>⚠️ 弱み・注意点</h2>
      <p>${curated.weakness}</p>
    </div>
    <div class="card">
      <h2>🔥 モチベーションが上がる要因</h2>
      <p>${curated.motivUp}</p>
    </div>
    <div class="card">
      <h2>📉 モチベーションが下がる要因</h2>
      <p>${curated.motivDown}</p>
    </div>
    <div class="card">
      <h2>🤝 上司として接する際のポイント</h2>
      <p>${curated.mgmtPoint}</p>
    </div>`;
    return;
  }

  const prof = genProfileText(p);
  el.innerHTML = header + `
    <div class="card">
      <h2>💪 強み</h2>
      ${prof.strengths.map(s=>`<div class="advice-box"><span class="label">${s.title}</span>${s.text}</div>`).join('')}
    </div>
    <div class="card">
      <h2>⚠️ 弱み・注意点</h2>
      ${prof.weaknesses.map(s=>`<div class="advice-box"><span class="label">${s.title}</span>${s.text}</div>`).join('')}
      <p class="note" style="margin-top:10px;margin-bottom:0;">※ 強み・弱みはエゴグラムの数値パターンから自動生成した参考情報です。断定的な評価ではありません。</p>
    </div>`;
}

// ---------- HQ tab ----------
function renderHqList(){
  const el = document.getElementById('hqList');
  const names = Object.keys(HQ_PROFILES);
  el.innerHTML = names.map(name=>{
    const m = PEOPLE.find(p=>p.name===name) || {name, role:'', cp:null,np:null,a:null,fc:null,ac:null};
    const prof = HQ_PROFILES[name];
    let html = `<div class="card">
      <h2>👑 ${name}${m.role?`<span class="badge" style="margin-left:8px;">${m.role}</span>`:''}</h2>
      ${barsHtml(m)}`;
    if(prof){
      html += `<div class="manager-summary" style="margin-top:10px;">${prof.trait}</div>
      <div class="advice-box" style="margin-top:10px;"><span class="label">強み</span>${prof.strength}</div>
      <div class="advice-box"><span class="label">弱み</span>${prof.weakness}</div>`;
      if(prof.tips && prof.tips.length){
        html += `<div class="advice-box"><span class="label">この人と付き合うポイント</span></div>`;
        prof.tips.forEach(t=>{
          html += `<div class="curated-item" style="padding:8px 0;">
            <div class="curated-body">
              <span class="curated-title">${t.title}</span>
              <p class="curated-reason">${t.text}</p>
            </div>
          </div>`;
        });
      }
    }
    html += '</div>';
    return html;
  }).join('');
}

// ---------- tabs ----------
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['store','staff','hq'].forEach(t=>{
      document.getElementById('tab-'+t).style.display = (t===btn.dataset.tab)?'block':'none';
    });
  });
});

// ---------- theme toggle ----------
async function initTheme(){
  let theme = 'dark';
  try{
    const res = await window.storage.get('theme');
    if(res && res.value) theme = res.value;
  }catch(e){ /* default dark */ }
  applyTheme(theme);
}
function applyTheme(theme){
  if(theme === 'light'){
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('themeToggle').textContent = '☀️ ライト';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeToggle').textContent = '🌙 ダーク';
  }
}
document.getElementById('themeToggle').addEventListener('click', async ()=>{
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  applyTheme(next);
  try{ await window.storage.set('theme', next); }catch(e){ /* ignore */ }
});

// ---------- init ----------
populateStoreSelect();
renderStoreContent();
populateStaffStoreSelect();
renderStaffPicker();
renderHqList();
initTheme();
</script>
